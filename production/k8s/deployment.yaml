# =============================================================================
# Kubernetes Namespace
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: customer-success-fte
  labels:
    app: customer-success-fte
    environment: production
---
# =============================================================================
# ConfigMap - Application Configuration
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: fte-config
  namespace: customer-success-fte
data:
  # Environment
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"

  # Database
  POSTGRES_HOST: "postgres.customer-success-fte.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "fte_db"
  POSTGRES_USER: "fte_user"

  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "kafka.kafka.svc.cluster.local:9092"
  KAFKA_GROUP_ID: "fte-message-processor"

  # Channel Configs
  GMAIL_ENABLED: "true"
  WHATSAPP_ENABLED: "true"
  WEBFORM_ENABLED: "true"

  # Response Limits
  MAX_EMAIL_LENGTH: "2000"
  MAX_WHATSAPP_LENGTH: "1600"
  MAX_WEBFORM_LENGTH: "1000"

  # CORS
  CORS_ORIGINS: "https://support.yourdomain.com,https://app.yourdomain.com"

  # Feature Flags
  ENABLE_SENTIMENT_ANALYSIS: "true"
  ENABLE_AUTO_ESCALATION: "true"
  ENABLE_CROSS_CHANNEL_CONTINUITY: "true"
---
# =============================================================================
# Secret - Sensitive Configuration
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: fte-secrets
  namespace: customer-success-fte
type: Opaque
stringData:
  # OpenAI API Key
  OPENAI_API_KEY: "${OPENAI_API_KEY}"

  # Database Password
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"

  # Gmail Credentials (base64 encoded service account JSON)
  GMAIL_CREDENTIALS_JSON: "${GMAIL_CREDENTIALS_JSON}"

  # Twilio Credentials
  TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID}"
  TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN}"
  TWILIO_WHATSAPP_NUMBER: "whatsapp:+14155238886"

  # Kafka SASL (if enabled)
  KAFKA_USERNAME: "${KAFKA_USERNAME}"
  KAFKA_PASSWORD: "${KAFKA_PASSWORD}"
---
# =============================================================================
# API Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fte-api
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: customer-success-fte
      component: api
  template:
    metadata:
      labels:
        app: customer-success-fte
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: fte-service-account
      containers:
      - name: fte-api
        image: your-registry/customer-success-fte:latest
        imagePullPolicy: Always
        command: ["uvicorn", "production.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: fte-config
        - secretRef:
            name: fte-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /live
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: gmail-credentials
          mountPath: /app/credentials
          readOnly: true
      volumes:
      - name: gmail-credentials
        secret:
          secretName: gmail-credentials-secret
          optional: true
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - api
              topologyKey: kubernetes.io/hostname
---
# =============================================================================
# Message Processor Worker Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fte-message-processor
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
    component: message-processor
spec:
  replicas: 3
  selector:
    matchLabels:
      app: customer-success-fte
      component: message-processor
  template:
    metadata:
      labels:
        app: customer-success-fte
        component: message-processor
    spec:
      serviceAccountName: fte-service-account
      containers:
      - name: message-processor
        image: your-registry/customer-success-fte:latest
        imagePullPolicy: Always
        command: ["python", "-m", "production.workers.message_processor"]
        envFrom:
        - configMapRef:
            name: fte-config
        - secretRef:
            name: fte-secrets
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - pgrep
            - -f
            - message_processor
          initialDelaySeconds: 30
          periodSeconds: 30
---
# =============================================================================
# API Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: customer-success-fte
  namespace: customer-success-fte
  labels:
    app: customer-success-fte
    component: api
spec:
  type: ClusterIP
  selector:
    app: customer-success-fte
    component: api
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
---
# =============================================================================
# Ingress
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: customer-success-fte
  namespace: customer-success-fte
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - support-api.yourdomain.com
    secretName: fte-tls
  rules:
  - host: support-api.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: customer-success-fte
            port:
              number: 80
---
# =============================================================================
# Horizontal Pod Autoscaler - API
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fte-api-hpa
  namespace: customer-success-fte
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fte-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
---
# =============================================================================
# Horizontal Pod Autoscaler - Worker
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fte-worker-hpa
  namespace: customer-success-fte
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fte-message-processor
  minReplicas: 3
  maxReplicas: 30
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
# =============================================================================
# Service Account
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fte-service-account
  namespace: customer-success-fte
---
# =============================================================================
# Pod Disruption Budget - API
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fte-api-pdb
  namespace: customer-success-fte
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: customer-success-fte
      component: api
---
# =============================================================================
# Pod Disruption Budget - Worker
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fte-worker-pdb
  namespace: customer-success-fte
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: customer-success-fte
      component: message-processor
---
# =============================================================================
# Network Policy
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fte-network-policy
  namespace: customer-success-fte
spec:
  podSelector:
    matchLabels:
      app: customer-success-fte
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  - from:
    - podSelector:
        matchLabels:
          app: customer-success-fte
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 9092
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
